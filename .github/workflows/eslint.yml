name: ESLint Code Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  eslint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # required to upload SARIF to Code Scanning
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node.js dependencies
        run: npm ci

      - name: Create reports directory
        run: mkdir -p reports

      - name: Run ESLint with SARIF output
        # Continue even if ESLint finds problems, so the SARIF report still gets uploaded.
        run: npx eslint . --format @microsoft/eslint-formatter-sarif --output-file reports/eslint-results.sarif || true

      - name: Upload SARIF report
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: reports/eslint-results.sarif

      - name: Fail if ESLint found issues
        # Run ESLint again (normal output); a non-zero exit fails the job.
        run: npx eslint .
